<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueChat | Espace d'échange</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="user-profile">
                    <img src="https://i.pravatar.cc/150?u=me" alt="Mon profil" class="avatar">
                </div>
                <div class="header-icons">
                    <i class="fas fa-circle-notch" title="Statut"></i>
                    <i class="fas fa-comment-alt" title="Nouveau message"></i>
                    <i class="fas fa-ellipsis-v" title="Menu"></i>
                </div>
            </header>

            <div class="search-box">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Rechercher ou démarrer une discussion">
                </div>
            </div>

            <div class="chat-list">
                <div class="contact active">
                    <img src="https://i.pravatar.cc/150?u=alice" alt="Alice" class="avatar">
                    <div class="contact-info">
                        <div class="contact-top">
                            <h4>Alice</h4>
                            <span class="time">14:30</span>
                        </div>
                        <p class="last-msg">On se voit à 18h ? 🚀</p>
                    </div>
                </div>
                <div class="contact">
                    <img src="https://i.pravatar.cc/150?u=bob" alt="Bob" class="avatar">
                    <div class="contact-info">
                        <div class="contact-top">
                            <h4>Groupe Projet</h4>
                            <span class="time">Hier</span>
                        </div>
                        <p class="last-msg">Image reçue ✅</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="chat-window">
            <header class="chat-header">
                <div class="chat-contact-info">
                    <img src="https://i.pravatar.cc/150?u=alice" alt="Alice" class="avatar">
                    <div>
                        <h3>Alice</h3>
                        <span class="status">En ligne</span>
                    </div>
                </div>
                <div class="header-icons">
                    <i class="fas fa-video"></i>
                    <i class="fas fa-phone-alt"></i>
                    <i class="fas fa-search"></i>
                </div>
            </header>

            <div class="messages-container" id="messageDisplay">
                <div class="message received">
                    <p>Salut ! Tu as fini le design ?</p>
                    <span class="msg-time">14:25</span>
                </div>
                <div class="message sent">
                    <p>Oui, je t'envoie la photo du rendu tout de suite.</p>
                    <span class="msg-time">14:28</span>
                </div>
            </div>

            <footer class="chat-footer">
                <i class="far fa-smile icon-btn" title="Emojis"></i>
                <label for="file-input">
                    <i class="fas fa-paperclip icon-btn" title="Joindre"></i>
                </label>
                <input type="file" id="file-input" hidden accept="image/*,video/*">
                
                <form class="input-wrapper" id="chatForm">
                    <input type="text" id="userInput" placeholder="Taper un message..." autocomplete="off">
                    <button type="submit" class="send-btn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </footer>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
